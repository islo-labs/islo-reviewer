name: Islo Preview

on:
  pull_request:
    types: [labeled, unlabeled, synchronize, closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to preview"
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.action == 'labeled' && github.event.label.name == 'preview') ||
      (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'preview'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: islo-preview-${{ github.event.pull_request.number || inputs.pr_number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: islo-labs/islo-reviewer/preview@v1
        with:
          pr_number: ${{ github.event.pull_request.number || inputs.pr_number }}
          share_port: "3000"
          pause_after_idle_seconds: "1800"
        env:
          ISLO_API_KEY: ${{ secrets.ISLO_API_KEY }}

  cleanup:
    if: >-
      github.event.action == 'closed' ||
      (github.event.action == 'unlabeled' && github.event.label.name == 'preview')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: islo-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    steps:
      - uses: islo-labs/islo-reviewer/preview@v1
        with:
          pr_number: ${{ github.event.pull_request.number }}
          cleanup: "true"
        env:
          ISLO_API_KEY: ${{ secrets.ISLO_API_KEY }}
