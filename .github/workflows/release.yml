name: Release

on:
  push:
    branches: [main]

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Move v1 tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -f v1
          git push origin v1 -f
